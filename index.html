<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RescuePro</title>

    <link rel="apple-touch-icon" href="./IMG_4138.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-red: #8b151a; }
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; }
        
        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8b151a; display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.5s;
        }
        #splash img { width: 150px; border-radius: 30px; }
        
        #app-content { display: none; }
        .navbar { background-color: var(--primary-red) !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="./IMG_4138.png" alt="Logo">
</div>

<div id="app-content">
    <nav class="navbar navbar-dark p-3">
        <span class="navbar-brand fw-bold">RESCUEPRO</span>
    </nav>

    <div class="container mt-4">
        <div class="card p-3">
            <h5 class="text-danger fw-bold">Protocollo BLSD</h5>
            <p class="small">30 Compressioni : 2 Ventilazioni. Frequenza 100-120/min.</p>
        </div>
        
        <button class="btn btn-danger w-100 btn-lg mt-3" onclick="alert('Quiz in arrivo!')">Inizia Quiz</button>
    </div>
</div>

<script>
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }, 500);
        }, 2000);
    };
</script>
</body>
</html>
